apiVersion: apps/v1
kind: Deployment
metadata:
  name: heb-transcription-api
  namespace: heb-transcription
spec:
  replicas: 2
  selector:
    matchLabels:
      app: heb-transcription-api
  template:
    metadata:
      labels:
        app: heb-transcription-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/heb-transcription-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_ENV
              value: "prod"
            - name: PRIMARY_MODEL_ID
              value: "ivrit-ai/whisper-large-v3"
            - name: NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: heb-transcription-secrets
                  key: DB_URL
            - name: TOKEN_HASH_PEPPER
              valueFrom:
                secretKeyRef:
                  name: heb-transcription-secrets
                  key: TOKEN_HASH_PEPPER
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: heb-transcription-api
  namespace: heb-transcription
spec:
  selector:
    app: heb-transcription-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
